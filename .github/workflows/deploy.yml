# 工作流名称
name: 自动部署到GitHub Pages

# 触发条件：推送到main分支时执行
on:
  push:
    branches: [ main ]

# 权限配置（必须）
permissions:
  contents: write
  pages: write
  id-token: write

# 工作流任务
jobs:
  deploy:
    # 运行环境
    runs-on: ubuntu-latest
    
    # 任务步骤
    steps:
      # 1. 拉取仓库代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 2. 设置Node.js环境（匹配你的项目Node版本，比如18/20）
      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # 缓存依赖，加速构建

      # 3. 安装依赖
      - name: 安装依赖
        run: npm install

      # 4. 构建项目（根据你的项目调整构建命令）
      - name: 构建项目
        run: npm run build
        # 注意：如果是Next.js项目，构建后需要导出静态文件，可替换为：
        # run: npm run build && npm run export

      # 5. 部署到GitHub Pages
      - name: 部署到GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # GitHub自动生成的令牌
          publish_dir: ./out # 静态文件输出目录（Next.js导出后默认是out，React/Vue通常是dist）
          # 如果是普通React项目，publish_dir改为 ./build